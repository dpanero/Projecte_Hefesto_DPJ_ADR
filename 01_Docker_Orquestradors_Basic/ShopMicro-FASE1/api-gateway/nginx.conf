events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        location /api/products/ {
            proxy_pass http://product-service:5000/products/;
        }
        location = /api/products {
            proxy_pass http://product-service:5000/products;
        }

        location /api/orders/ {
            proxy_pass http://order-service:5000/orders/;
        }
        location = /api/orders {
            proxy_pass http://order-service:5000/orders;
        }

        location /api/users/ {
            proxy_pass http://user-service:5000/users/;
        }
        location = /api/users {
            proxy_pass http://user-service:5000/users;
        }
    }
}