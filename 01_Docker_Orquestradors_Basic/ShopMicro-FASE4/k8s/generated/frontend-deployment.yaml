apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopmicro
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
      - name: wait-for-api-gateway
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Esperant que api-gateway estigui llest..."
            until nslookup api-gateway.shopmicro.svc.cluster.local; do
              echo "DNS no resolt encara, esperant 2s..."
              sleep 2
            done
            echo "api-gateway disponible!"
      containers:
      - name: frontend
        image: arodriguez5/shopmicro-frontend:1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet: { path: /, port: 80 }
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /, port: 80 }
          periodSeconds: 10