services:
  # ============== BASES DE DADES I CUES (només al manager) ==============
  db-products:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: products_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD_FILE: /run/secrets/db_user_password
    secrets:
      - db_root_password
      - db_user_password
    volumes:
      - db_products_data:/var/lib/mysql
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  db-orders:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: orders_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD_FILE: /run/secrets/db_user_password
    secrets:
      - db_root_password
      - db_user_password
    volumes:
      - db_orders_data:/var/lib/mysql
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  cache:
    image: redis:7-alpine
    networks:
      - data-net
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  message-queue:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - mq_data:/var/lib/rabbitmq
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ============== MICROSERVEIS (replicats als workers) ==============
  product-service:
    image: arodriguez5/shopmicro-product-service:1.0
    environment:
      DB_HOST: db-products
      DB_USER: appuser
      DB_PASSWORD: apppass123
      DB_NAME: products_db
      REDIS_HOST: cache
    networks:
      - backend-net
      - data-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  order-service:
    image: arodriguez5/shopmicro-order-service:1.0
    environment:
      DB_PRODUCTS_HOST: db-products
      DB_ORDERS_HOST: db-orders
      DB_USER: appuser
      DB_PASSWORD: apppass123
      MQ_HOST: message-queue
      MQ_USER: admin
      MQ_PASS: admin123
    networks:
      - backend-net
      - data-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  user-service:
    image: arodriguez5/shopmicro-user-service:1.0
    environment:
      DB_HOST: db-orders
      DB_USER: appuser
      DB_PASSWORD: apppass123
      DB_NAME: orders_db
      JWT_SECRET: clausecreta_2asix
    networks:
      - backend-net
      - data-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  notification-service:
    image: arodriguez5/shopmicro-notification-service:1.0
    environment:
      MQ_HOST: message-queue
      MQ_USER: admin
      MQ_PASS: admin123
    networks:
      - data-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ============== GATEWAY I FRONTEND ==============
  api-gateway:
    image: arodriguez5/shopmicro-api-gateway:1.0
    networks:
      - frontend-net
      - backend-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  frontend:
    image: arodriguez5/shopmicro-frontend:1.0
    ports:
      - "8080:80"
    networks:
      - frontend-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

# ============== XARXES OVERLAY (necessàries en Swarm multi-node) ==============
networks:
  frontend-net:
    driver: overlay
  backend-net:
    driver: overlay
  data-net:
    driver: overlay

volumes:
  db_products_data:
  db_orders_data:
  cache_data:
  mq_data:

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_user_password:
    file: ./secrets/db_user_password.txt
